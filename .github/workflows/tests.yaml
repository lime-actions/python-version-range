name: Tests
run-name: Testing the action
on:
  push:
    paths:
    - 'action.yaml'
    - '.github/workflows/tests.yaml'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
        sparse-checkout: |
          action.yaml
          tests/
        sparse-checkout-cone-mode: false
    - name: Change folder
      run: cd tests/base
    - name: Get versions base
      id: test_base
      uses: ./
    - name: Check
      if: ${{ !startsWith(steps.test_base.outputs.min, '3.10')
              || !startsWith(steps.test_base.outputs.max, '3.13')
              || !startsWith(steps.test_base.outputs.versions, '["3.10", "3.13')
              }}
      run: |
        echo "${{ steps.test_base.outputs.min }}"
        echo "${{ steps.test_base.outputs.max }}"
        echo "${{ steps.test_base.outputs.versions }}"
        exit 101
    - name: Get versions base
      id: test_prereleases
      uses: ./
      with:
        include-prereleases: true
    - name: Check
      if: ${{ !startsWith(steps.test_prereleases.outputs.min, '3.10')
              || !startsWith(steps.test_prereleases.outputs.max, '3.14')
              || !startsWith(steps.test_prereleases.outputs.versions,
                            '["3.10", "3.14') }}
      run: |
        echo "${{ steps.test_prereleases.outputs.min }}"
        echo "${{ steps.test_prereleases.outputs.max }}"
        echo "${{ steps.test_prereleases.outputs.versions }}"
        exit 101
    - name: Change folder
      run: cd ..tests/no-tox
    - name: Get versions without tox.ini
      id: test_no-tox
      uses: ./
    - name: Check
      if: ${{ !startsWith(steps.test_no-tox.outputs.min, '3.10')
              || steps.test_no-tox.outputs.max != ''
              || steps.test_no-tox.outputs.versions != '["3.10"]' }}
      run: |
        echo "${{ steps.test_no-tox.outputs.min }}"
        echo "${{ steps.test_no-tox.outputs.max }}"
        echo "${{ steps.test_no-tox.outputs.versions }}"
        exit 101
    - name: Change folder
      run: cd "..tests/multi-line envlist"
    - name: Get versions without tox.ini
      id: test_multiline
      uses: ./
    - name: Check
      if: ${{ !startsWith(steps.test_multiline.outputs.min, '3.10')
              || !startsWith(steps.test_multiline.outputs.max, '3.13')
              || !startsWith(steps.test_multiline.outputs.versions,
                            '["3.10", "3.13') }}
      run: |
        echo "${{ steps.test_multiline.outputs.min }}"
        echo "${{ steps.test_multiline.outputs.max }}"
        echo "${{ steps.test_multiline.outputs.versions }}"
        exit 101
